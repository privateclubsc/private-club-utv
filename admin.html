<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Private Club UTV 8</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:     #0a0a0a;
      --card:   #141414;
      --border: rgba(255,255,255,.08);
      --orange: #ff6200;
      --white:  #fff;
      --gray:   #666;
      --lgray:  #999;
      --red:    #e53e3e;
      --green:  #25D366;
    }
    body { background: var(--bg); color: var(--white); font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-logo {
      font-size: 11px; letter-spacing: 6px; text-transform: uppercase;
      color: var(--orange); margin-bottom: 8px;
    }
    .login-title { font-size: 22px; font-weight: 800; margin-bottom: 32px; }
    .login-box input {
      width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
      color: var(--white); padding: 14px 16px; font-size: 15px; margin-bottom: 12px;
      outline: none; transition: border .2s;
    }
    .login-box input:focus { border-color: var(--orange); }
    .btn-orange {
      width: 100%; background: var(--orange); color: #fff; border: none;
      padding: 14px; font-size: 12px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; transition: background .2s;
    }
    .btn-orange:hover { background: #ff7a30; }
    .login-err {
      color: var(--red); font-size: 12px; margin-top: 10px; display: none;
    }

    /* ── ADMIN PANEL ── */
    #admin-panel { display: none; }

    .topbar {
      background: rgba(0,0,0,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--orange); }
    .topbar-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .btn-logout {
      background: none; border: 1px solid var(--border); color: var(--lgray);
      padding: 8px 16px; font-size: 10px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .main { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

    .section-title {
      font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--orange); margin-bottom: 20px;
    }

    /* export bar */
    .export-bar {
      background: var(--card); border: 1px solid var(--border);
      padding: 20px 24px; margin-bottom: 40px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .export-info p { font-size: 13px; color: var(--lgray); line-height: 1.5; }
    .export-info strong { color: var(--white); }
    .btn-export {
      background: var(--orange); color: #fff; border: none;
      padding: 14px 28px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; white-space: nowrap;
      transition: background .2s;
    }
    .btn-export:hover { background: #ff7a30; }

    /* vehicle list */
    .vehicle-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }

    .vitem {
      background: var(--card); border: 1px solid var(--border);
      padding: 20px 24px;
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 16px; align-items: center;
      transition: border-color .2s;
    }
    .vitem:hover { border-color: rgba(255,98,0,.3); }
    .vitem-thumb {
      width: 80px; height: 60px; background: #1a1a1a;
      border-radius: 2px; overflow: hidden; flex-shrink: 0;
    }
    .vitem-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .vitem-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .vitem-info .vmeta { font-size: 11px; color: var(--lgray); letter-spacing: 1px; }
    .vitem-price { font-size: 20px; font-weight: 800; color: var(--orange); }
    .vitem-price span { font-size: 11px; color: var(--gray); font-weight: 400; }
    .vitem-actions { display: flex; gap: 8px; }
    .btn-edit {
      background: rgba(255,98,0,.12); color: var(--orange); border: 1px solid rgba(255,98,0,.3);
      padding: 8px 16px; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-edit:hover { background: rgba(255,98,0,.25); }
    .btn-delete {
      background: rgba(229,62,62,.1); color: var(--red); border: 1px solid rgba(229,62,62,.25);
      padding: 8px 16px; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-delete:hover { background: rgba(229,62,62,.2); }

    /* add button */
    .btn-add {
      width: 100%; background: none; border: 2px dashed var(--border); color: var(--lgray);
      padding: 20px; font-size: 12px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-add:hover { border-color: var(--orange); color: var(--orange); }

    /* ── MODAL ── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.85); z-index: 500;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
    }
    .modal-head {
      padding: 24px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-head h2 { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .modal-close {
      background: none; border: none; color: var(--lgray); font-size: 22px;
      cursor: pointer; line-height: 1; transition: color .2s;
    }
    .modal-close:hover { color: var(--white); }
    .modal-body { padding: 28px; }

    .form-row { margin-bottom: 20px; }
    .form-row label {
      display: block; font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--lgray); margin-bottom: 8px;
    }
    .form-row input, .form-row select {
      width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
      color: var(--white); padding: 12px 14px; font-size: 14px; outline: none;
      transition: border .2s;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--orange); }
    .form-row select option { background: #1a1a1a; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .specs-section { margin-top: 8px; }
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .spec-pair { display: flex; gap: 8px; }
    .spec-pair input:first-child { flex: 1; font-size: 11px; color: var(--lgray); }
    .spec-pair input:last-child { flex: 2; }

    .modal-foot {
      padding: 20px 28px; border-top: 1px solid var(--border);
      display: flex; gap: 12px; justify-content: flex-end;
    }
    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--lgray);
      padding: 12px 24px; font-size: 11px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-cancel:hover { border-color: var(--lgray); color: var(--white); }
    .btn-save {
      background: var(--orange); color: #fff; border: none;
      padding: 12px 28px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: background .2s;
    }
    .btn-save:hover { background: #ff7a30; }

    /* toast */
    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 999;
      background: var(--orange); color: #fff;
      padding: 14px 24px; font-size: 12px; font-weight: 600; letter-spacing: 1px;
      transform: translateY(80px); opacity: 0; transition: all .3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 600px) {
      .topbar { padding: 14px 16px; }
      .main { padding: 24px 16px 60px; }
      .export-bar { flex-direction: column; }
      .form-grid, .specs-grid { grid-template-columns: 1fr; }
      .vitem { grid-template-columns: 1fr; }
      .vitem-thumb { width: 100%; height: 44vw; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <p class="login-logo">Private Club UTV 8</p>
    <h1 class="login-title">Panel de control</h1>
    <input type="password" id="pw-input" placeholder="Contraseña" autocomplete="off">
    <button class="btn-orange" onclick="checkLogin()">Entrar</button>
    <p class="login-err" id="login-err">Contraseña incorrecta</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Private Club</span>
      <span class="topbar-title">Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="main">

    <!-- Export -->
    <div class="export-bar">
      <div class="export-info">
        <p><strong>Cómo actualizar tu web:</strong> Edita los vehículos abajo → haz clic en "Generar y descargar" → sube el archivo descargado a GitHub como <strong>index.html</strong>.</p>
      </div>
      <button class="btn-export" onclick="exportSite()">Generar y descargar</button>
    </div>

    <!-- Vehicle list -->
    <p class="section-title">Vehículos en la flota</p>
    <div class="vehicle-list" id="vehicle-list"></div>
    <button class="btn-add" onclick="openModal()">+ Agregar vehículo</button>

  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Nuevo vehículo</h2>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-index">

      <div class="form-grid">
        <div class="form-row">
          <label>Marca</label>
          <input type="text" id="f-brand" placeholder="Ej: Polaris">
        </div>
        <div class="form-row">
          <label>Plazas</label>
          <select id="f-seats">
            <option value="1 plaza">1 plaza</option>
            <option value="2 plazas">2 plazas</option>
            <option value="4 plazas">4 plazas</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <label>Nombre del modelo</label>
        <input type="text" id="f-name" placeholder="Ej: RZR XP 4 Turbo">
      </div>

      <div class="form-row">
        <label>Nombre del archivo de foto (dentro de assets/)</label>
        <input type="text" id="f-img" placeholder="Ej: polaris-orange.jpg">
      </div>

      <div class="form-row">
        <label>Precio por hora (Bs)</label>
        <input type="number" id="f-price" placeholder="Ej: 800">
      </div>

      <div class="form-row">
        <label>Especificaciones (etiqueta — valor)</label>
        <div id="specs-container"></div>
        <button onclick="addSpec()" style="margin-top:10px;background:none;border:1px dashed #333;color:#666;padding:8px 16px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;transition:all .2s;" onmouseover="this.style.borderColor='#ff6200';this.style.color='#ff6200'" onmouseout="this.style.borderColor='#333';this.style.color='#666'">+ Agregar especificación</button>
      </div>

      <div class="form-row">
        <label>Mensaje de WhatsApp (pre-llenado)</label>
        <input type="text" id="f-wa" placeholder="Ej: Quiero reservar el Polaris RZR XP 4...">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveVehicle()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──
  // Cambia esta contraseña por la tuya:
  const PASSWORD = 'privateclub8';

  // ── DEFAULT DATA ──
  const DEFAULT_VEHICLES = [
    {
      brand: 'Can-Am',
      name: 'Maverick\nX3 RS Turbo',
      seats: '2 plazas',
      img: 'canam.jpg',
      price: 800,
      specs: [
        ['Motor','1000cc Turbo'],['Potencia','172 HP'],
        ['Plazas','2'],['Transmisión','CVT 4x4'],
        ['Suspensión','Fox Racing'],['Rines','Beadlock Rojo']
      ],
      wa: 'Hola! Quiero reservar el *Can-Am Maverick X3 RS Turbo* en Private Club UTV 8. ¿Qué horarios tienen?'
    },
    {
      brand: 'Polaris',
      name: 'RZR XP 4\nTurbo',
      seats: '4 plazas',
      img: 'polaris-orange.jpg',
      price: 800,
      specs: [
        ['Motor','Turbo'],['Potencia','168 HP'],
        ['Plazas','4'],['Transmisión','CVT AWD'],
        ['Suspensión','Walker Evans'],['Jaula','Naranja Custom']
      ],
      wa: 'Hola! Quiero reservar el *Polaris RZR XP 4 Turbo* en Private Club UTV 8. ¿Qué horarios tienen?'
    },
    {
      brand: 'Polaris',
      name: 'RZR XP 4\n1000',
      seats: '4 plazas',
      img: 'polaris-green.jpg',
      price: 700,
      specs: [
        ['Motor','1000cc'],['Potencia','110 HP'],
        ['Plazas','4'],['Transmisión','CVT AWD'],
        ['Suspensión','Walker Evans'],['Techo','Lima Custom']
      ],
      wa: 'Hola! Quiero reservar el *Polaris RZR XP 4 1000* en Private Club UTV 8. ¿Qué horarios tienen?'
    },
    {
      brand: 'Honda',
      name: 'XR\n250cc',
      seats: '1 plaza',
      img: 'honda.jpg',
      price: 250,
      specs: [
        ['Motor','250cc'],['Tipo','Enduro / Trail'],
        ['Plazas','1'],['Transmisión','Manual 6 vel.'],
        ['Frenos','Disco delantero'],['Condición','Impecable']
      ],
      wa: 'Hola! Quiero reservar la *Honda XR 250* en Private Club UTV 8. ¿Qué horarios tienen?'
    }
  ];

  // ── STATE ──
  let vehicles = JSON.parse(localStorage.getItem('pcutv_vehicles') || 'null') || JSON.parse(JSON.stringify(DEFAULT_VEHICLES));

  function save() { localStorage.setItem('pcutv_vehicles', JSON.stringify(vehicles)); }

  // ── AUTH ──
  function checkLogin() {
    const val = document.getElementById('pw-input').value;
    if (val === PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      renderList();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  }
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkLogin(); });
  function logout() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  }

  // ── LIST ──
  function renderList() {
    const list = document.getElementById('vehicle-list');
    list.innerHTML = '';
    vehicles.forEach((v, i) => {
      const nameDisplay = v.name.replace('\n', ' ');
      list.innerHTML += `
        <div class="vitem">
          <div class="vitem-thumb">
            <img src="assets/${v.img}" alt="${nameDisplay}" onerror="this.style.display='none'">
          </div>
          <div class="vitem-info">
            <h3>${v.brand} ${nameDisplay}</h3>
            <p class="vmeta">${v.seats} &nbsp;·&nbsp; ${v.specs[0] ? v.specs[0][1] : ''}</p>
          </div>
          <div>
            <div class="vitem-price">Bs ${v.price}<br><span>/ hora</span></div>
            <div class="vitem-actions" style="margin-top:10px">
              <button class="btn-edit" onclick="openModal(${i})">Editar</button>
              <button class="btn-delete" onclick="deleteVehicle(${i})">Eliminar</button>
            </div>
          </div>
        </div>`;
    });
  }

  // ── DELETE ──
  function deleteVehicle(i) {
    if (confirm('¿Eliminar este vehículo?')) {
      vehicles.splice(i, 1);
      save(); renderList(); showToast('Vehículo eliminado');
    }
  }

  // ── MODAL ──
  function openModal(i) {
    document.getElementById('edit-index').value = i !== undefined ? i : '';
    document.getElementById('modal-title').textContent = i !== undefined ? 'Editar vehículo' : 'Nuevo vehículo';
    const v = i !== undefined ? vehicles[i] : null;
    document.getElementById('f-brand').value = v ? v.brand : '';
    document.getElementById('f-name').value = v ? v.name.replace('\n',' ') : '';
    document.getElementById('f-seats').value = v ? v.seats : '2 plazas';
    document.getElementById('f-img').value = v ? v.img : '';
    document.getElementById('f-price').value = v ? v.price : '';
    document.getElementById('f-wa').value = v ? v.wa : '';
    const specs = v ? v.specs : [['Motor',''],['Potencia',''],['Plazas',''],['Transmisión','']];
    renderSpecInputs(specs);
    document.getElementById('modal-bg').classList.add('open');
  }
  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

  function renderSpecInputs(specs) {
    const c = document.getElementById('specs-container');
    c.innerHTML = '';
    specs.forEach(([lbl, val], i) => {
      c.innerHTML += `<div class="spec-pair" style="margin-bottom:8px">
        <input type="text" placeholder="Etiqueta" value="${lbl}" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#aaa;padding:10px 12px;font-size:12px;outline:none;flex:1">
        <input type="text" placeholder="Valor" value="${val}" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff;padding:10px 12px;font-size:13px;outline:none;flex:2">
      </div>`;
    });
  }
  function addSpec() {
    const c = document.getElementById('specs-container');
    c.innerHTML += `<div class="spec-pair" style="margin-bottom:8px">
      <input type="text" placeholder="Etiqueta" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#aaa;padding:10px 12px;font-size:12px;outline:none;flex:1">
      <input type="text" placeholder="Valor" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff;padding:10px 12px;font-size:13px;outline:none;flex:2">
    </div>`;
  }

  function saveVehicle() {
    const idx = document.getElementById('edit-index').value;
    const pairs = document.querySelectorAll('#specs-container .spec-pair');
    const specs = [];
    pairs.forEach(p => {
      const inputs = p.querySelectorAll('input');
      if (inputs[0].value.trim()) specs.push([inputs[0].value.trim(), inputs[1].value.trim()]);
    });
    const nameRaw = document.getElementById('f-name').value.trim();
    const v = {
      brand: document.getElementById('f-brand').value.trim(),
      name: nameRaw,
      seats: document.getElementById('f-seats').value,
      img: document.getElementById('f-img').value.trim(),
      price: parseInt(document.getElementById('f-price').value) || 0,
      specs,
      wa: document.getElementById('f-wa').value.trim()
    };
    if (!v.brand || !v.name) { alert('Completa al menos la marca y el nombre.'); return; }
    if (idx !== '') { vehicles[parseInt(idx)] = v; } else { vehicles.push(v); }
    save(); renderList(); closeModal();
    showToast(idx !== '' ? 'Vehículo actualizado' : 'Vehículo agregado');
  }

  // ── EXPORT ──
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function encodeWa(s) { return encodeURIComponent(s); }

  function buildVehicleCard(v, even) {
    const nameHtml = v.name.replace('\n','<br>');
    const specsHtml = v.specs.map(([l,val]) => `
        <div class="spec"><p class="spec-l">${escHtml(l)}</p><p class="spec-v">${escHtml(val)}</p></div>`).join('');
    const waLink = `https://wa.me/59172012700?text=${encodeWa(v.wa)}`;

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
    showToast('index.html descargado. Subelo a GitHub.');
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
